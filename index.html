<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA 30</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #020617;
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

.logo {
    height: 60px;
}

nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #aaa;
    font-weight: 300;
}

nav a:hover {
    color: #fff;
}

.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 40px;
}

.hero-text {
    max-width: 500px;
}

.hero h1 {
    font-size: 60px;
    font-weight: 700;
    margin: 0;
}

.hero p {
    color: #aaa;
    margin: 20px 0;
}

.btn {
    background: linear-gradient(90deg, #00f0ff, #ff00c8, #ff7a00);
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

.player {
    margin: 40px;
    padding: 30px;
    border-radius: 20px;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.play-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00f0ff, #ff00c8, #ff7a00);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.section {
    padding: 40px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: #0f172a;
    padding: 20px;
    border-radius: 15px;
    flex: 1;
}

footer {
    text-align: center;
    padding: 20px;
    color: #666;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo">
    <nav>
        <a href="#">Inicio</a>
        <a href="#">En vivo</a>
        <a href="#">Programación</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>LA 30</h1>
        <p>Música sin límites. Urbano, electrónica y más. Vive la vibra.</p>
        <button class="btn">Escuchar en vivo</button>
    </div>
    <img src="logo.png" style="width:300px;">
</section>

<div class="player">
    <div>
        <h2>🔴 EN VIVO</h2>
        <p>LA 30 - Música sin límites</p>
    </div>
    <div class="play-btn" onclick="toggleRadio()">▶</div>
</div>

<audio id="radio" src="https://radio.conectarservidor.com:8006/stream"></audio>

<section class="section">
    <h2>Sonando ahora</h2>
    <div class="cards">
        <div class="card">Track actual...</div>
        <div class="card">Trap / Hip Hop</div>
        <div class="card">Techno / House</div>
    </div>
</section>

<footer>
    © 2026 LA 30
</footer>

<script>
const radio = document.getElementById("radio");
let playing = false;

function toggleRadio() {
    if (!playing) {
        radio.play();
        playing = true;
    } else {
        radio.pause();
        playing = false;
    }
}
</script>

</body>
</html>
